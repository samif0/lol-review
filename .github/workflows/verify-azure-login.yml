# Throwaway probe: verifies the Azure federated credential / OIDC login works,
# WITHOUT running a full build+sign+release. Trigger it manually from the
# Actions tab ("Verify Azure Login" → Run workflow). If the "Azure login (OIDC)"
# step goes green, the credential is correct and a real signed release will
# authenticate too. Delete this file once signing is confirmed working.
name: Verify Azure Login

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Confirm login succeeded
        run: echo "Azure OIDC login succeeded — federated credential is correct."
