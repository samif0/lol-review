name: Build & Release

on:
  push:
    tags:
      - 'v1.*'
      - 'v2.0.*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create isolated build venv
        shell: pwsh
        run: |
          # Use an isolated venv so PyInstaller only sees our Python 3.11
          # and doesn't accidentally pick up DLLs from other Python versions
          # on the runner (e.g. python314.dll from a pre-installed 3.14).
          python -m venv build_venv
          .\build_venv\Scripts\python -m pip install --upgrade pip
          .\build_venv\Scripts\pip install -r requirements.txt pyinstaller

      - name: Extract version from tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "Building version $VERSION from tag $TAG"

      - name: Stamp version.py
        shell: pwsh
        run: |
          $version = "${{ env.VERSION }}"
          $path = "src/version.py"
          $content = Get-Content $path -Raw
          $content = $content -replace '__version__ = "[^"]*"', "__version__ = `"$version`""
          Set-Content $path $content
          Write-Host "Stamped version: $version"

      - name: Build native launcher
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          if not exist launcher_out mkdir launcher_out
          cl.exe /O2 /W3 /Fe:launcher_out\LoLReview.exe launcher\launcher.c /link kernel32.lib user32.lib
          if %ERRORLEVEL% NEQ 0 (
            echo Launcher build failed!
            exit /b 1
          )
          echo Launcher built successfully

      - name: Verify launcher
        shell: pwsh
        run: |
          $exe = "launcher_out\LoLReview.exe"
          if (Test-Path $exe) {
            $kb = [math]::Round((Get-Item $exe).Length / 1KB, 1)
            Write-Host "Launcher built: $kb KB"
          } else {
            Write-Error "Launcher build failed — LoLReview.exe not found in launcher_out"
            exit 1
          }

      - name: Create deps directory
        run: New-Item -ItemType Directory -Force -Path deps

      - name: Download ffmpeg
        shell: pwsh
        run: |
          try {
            Write-Host "Downloading ffmpeg..."
            $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
            Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip -TimeoutSec 180
            Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_tmp -Force
            $exe = Get-ChildItem -Recurse -Filter "ffmpeg.exe" ffmpeg_tmp `
                   | Where-Object { $_.DirectoryName -like "*bin*" } `
                   | Select-Object -First 1
            if ($exe) {
              Copy-Item $exe.FullName -Destination deps\ffmpeg.exe
              $mb = [math]::Round((Get-Item deps\ffmpeg.exe).Length / 1MB, 1)
              Write-Host "ffmpeg ready ($mb MB)"
            } else {
              Write-Warning "ffmpeg.exe not found in archive — building without it"
            }
          } catch {
            Write-Warning "ffmpeg download failed: $_ — building without it"
          } finally {
            Remove-Item ffmpeg.zip, ffmpeg_tmp -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Download libmpv
        shell: pwsh
        run: |
          try {
            Write-Host "Fetching latest mpv release info..."
            $headers = @{ "User-Agent" = "lol-review-ci" }
            $release = Invoke-RestMethod `
              -Uri "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest" `
              -Headers $headers -TimeoutSec 30
            $asset = $release.assets `
              | Where-Object { $_.name -like "mpv-dev-x86_64-*.7z" } `
              | Select-Object -First 1
            if ($asset) {
              Write-Host "Downloading $($asset.name)..."
              Invoke-WebRequest -Uri $asset.browser_download_url `
                -OutFile mpv-dev.7z -TimeoutSec 180
              & 7z e mpv-dev.7z libmpv-2.dll -odeps -y 2>&1 | Out-Null
              if (Test-Path deps\libmpv-2.dll) {
                $mb = [math]::Round((Get-Item deps\libmpv-2.dll).Length / 1MB, 1)
                Write-Host "libmpv-2.dll ready ($mb MB)"
              } else {
                Write-Warning "libmpv-2.dll not found in archive — VOD playback will use system player"
              }
              Remove-Item mpv-dev.7z -Force -ErrorAction SilentlyContinue
            } else {
              Write-Warning "No mpv-dev-x86_64-*.7z asset found — building without libmpv"
            }
          } catch {
            Write-Warning "libmpv download failed: $_ — building without it"
          }

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          # Use the venv Python so PyInstaller only bundles 3.11 DLLs
          "y`ny" | .\build_venv\Scripts\python build.py

      - name: Verify build output
        shell: pwsh
        run: |
          $exe = "dist\LoLReview\LoLReview.exe"
          if (Test-Path $exe) {
            $mb = [math]::Round((Get-Item $exe).Length / 1MB, 1)
            Write-Host "Build succeeded: LoLReview.exe ($mb MB)"
          } else {
            Write-Error "Build failed — LoLReview.exe not found"
            exit 1
          }

      - name: Package SxS release
        shell: pwsh
        run: |
          $version = "${{ env.VERSION }}"
          $tag = "${{ env.TAG }}"
          $staging = "sxs_staging"

          # Create SxS directory structure:
          #   LoLReview.exe          <- tiny native launcher
          #   .current               <- points to active version
          #   app-X.Y.Z/             <- versioned app directory
          #     LoLReview.exe         <- actual PyInstaller app
          #     _internal/
          #     ...
          New-Item -ItemType Directory -Force -Path $staging
          New-Item -ItemType Directory -Force -Path "$staging\app-$version"

          # Copy launcher to root
          Copy-Item "launcher_out\LoLReview.exe" "$staging\LoLReview.exe"

          # Write .current pointer
          Set-Content -Path "$staging\.current" -Value $version -NoNewline -Encoding UTF8

          # Copy PyInstaller output into versioned subdirectory
          Copy-Item -Path "dist\LoLReview\*" -Destination "$staging\app-$version" -Recurse

          # Create the ZIP
          $zipName = "LoLReview-$tag.zip"
          Compress-Archive -Path "$staging\*" -DestinationPath $zipName
          $mb = [math]::Round((Get-Item $zipName).Length / 1MB, 1)
          Write-Host "Zipped: $zipName ($mb MB)"

          # Verify structure
          $entries = & 7z l $zipName
          $launcherFound = $entries | Where-Object { $_ -match "^\s+\d.*LoLReview\.exe$" }
          $appDirFound = $entries | Where-Object { $_ -like "*app-$version\LoLReview.exe*" }
          $currentFound = $entries | Where-Object { $_ -like "*.current*" }
          if ($launcherFound) { Write-Host "OK: Launcher at zip root" }
          else { Write-Warning "Launcher not at zip root" }
          if ($appDirFound) { Write-Host "OK: App in app-$version/" }
          else { Write-Warning "App not in expected versioned directory" }
          if ($currentFound) { Write-Host "OK: .current pointer present" }
          else { Write-Warning ".current not found in zip" }

          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "LoL Review ${{ env.TAG }}"
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
          fail_on_unmatched_files: true
