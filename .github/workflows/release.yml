name: Build & Release (C#)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write   # OIDC token for Azure Artifact Signing (azure/login)

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run critical tests
        run: dotnet test src/Revu.Core.Tests/Revu.Core.Tests.csproj -c Release -p:Platform=x64 --logger "console;verbosity=normal"

  build:
    runs-on: windows-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Extract version from tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "Building version $VERSION from tag $TAG"

      - name: Stamp version in csproj
        shell: pwsh
        run: |
          $version = "${{ env.VERSION }}"
          $csproj = "src/Revu.App/Revu.App.csproj"
          $content = Get-Content $csproj -Raw
          $content = $content -replace '<Version>[^<]*</Version>', "<Version>$version</Version>"
          Set-Content $csproj $content
          Write-Host "Stamped version: $version"

      - name: Download ffmpeg
        shell: pwsh
        run: |
          try {
            Write-Host "Downloading ffmpeg..."
            $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
            Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip -TimeoutSec 180
            Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_tmp -Force
            $exe = Get-ChildItem -Recurse -Filter "ffmpeg.exe" ffmpeg_tmp `
                   | Where-Object { $_.DirectoryName -like "*bin*" } `
                   | Select-Object -First 1
            if ($exe) {
              New-Item -ItemType Directory -Force -Path deps
              Copy-Item $exe.FullName -Destination deps\ffmpeg.exe
              $mb = [math]::Round((Get-Item deps\ffmpeg.exe).Length / 1MB, 1)
              Write-Host "ffmpeg ready ($mb MB)"
            } else {
              Write-Warning "ffmpeg.exe not found in archive — building without it"
            }
          } catch {
            Write-Warning "ffmpeg download failed: $_ — building without it"
          } finally {
            Remove-Item ffmpeg.zip, ffmpeg_tmp -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Restore NuGet packages
        run: dotnet restore src/Revu.App/Revu.App.csproj -r win-x64

      - name: Build and publish with MSBuild
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "publish"
          msbuild src/Revu.App/Revu.App.csproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:RuntimeIdentifier=win-x64 `
            /p:SelfContained=true `
            "/p:PublishDir=$publishDir\" `
            /t:Publish `
            /m `
            /verbosity:minimal

      - name: Copy ffmpeg to publish output
        shell: pwsh
        run: |
          if (Test-Path deps\ffmpeg.exe) {
            Copy-Item deps\ffmpeg.exe publish\ffmpeg.exe
            Write-Host "ffmpeg copied to publish output"
          } else {
            Write-Host "No ffmpeg to copy — clip extraction will be unavailable"
          }

      - name: Verify publish output
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "publish"
          Write-Host "Publish dir: $publishDir"
          Write-Host "Exists: $(Test-Path $publishDir)"
          if (Test-Path $publishDir) {
            $exe = Get-ChildItem $publishDir -Filter "LoLReview.App.exe" -ErrorAction SilentlyContinue
            $pri = Get-ChildItem $publishDir -Filter "resources.pri" -ErrorAction SilentlyContinue
            Write-Host "LoLReview.App.exe: $($exe.Length) bytes"
            Write-Host "resources.pri: $($pri.Length) bytes"
            Write-Host "Total files: $((Get-ChildItem $publishDir | Measure-Object).Count)"
          } else {
            Write-Error "Publish directory not found!"
            exit 1
          }

      # ───────────────────────── Code signing (Azure Artifact Signing) ─────────────────────────
      # OIDC login FIRST: azure/login exchanges the GitHub id-token for an Azure
      # token and exports AZURE_* env vars. The signing action uses
      # DefaultAzureCredential, which then reads those env vars — so this step is
      # REQUIRED (passing client/tenant ids to the action directly does NOT
      # trigger OIDC). allow-no-subscriptions: the signing app only has the
      # Certificate Profile Signer role, no subscription-level access.
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      # Stage 1: sign the app's OWN exe in publish/ BEFORE vpk packs it. We sign
      # only .exe (not the ~200 bundled runtime/dependency DLLs) — that's what
      # SmartScreen judges for the "unknown publisher" warning, and signing 200
      # DLLs one-at-a-time over the network took minutes and blew the timeout.
      # (If Vanguard ever quarantines auto-updates, revisit signing dll too.)
      - name: Sign published binaries
        uses: azure/trusted-signing-action@v2.0.0
        with:
          endpoint: https://eus.codesigning.azure.net/
          signing-account-name: revu-signing
          certificate-profile-name: revu-public
          files-folder: ${{ github.workspace }}\publish
          files-folder-filter: exe
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          timeout: 900

      - name: Install vpk CLI
        run: dotnet tool install -g vpk

      - name: Download previous Velopack release (for delta generation)
        shell: pwsh
        run: |
          vpk download github `
            --repoUrl "https://github.com/${{ github.repository }}" `
            --token "${{ secrets.GITHUB_TOKEN }}"

      - name: Pack Velopack release
        shell: pwsh
        run: |
          vpk pack `
            --packId LoLReview `
            --packTitle "Revu" `
            --packVersion "${{ env.VERSION }}" `
            --packDir publish `
            --mainExe LoLReview.App.exe `
            --outputDir Releases

      # Stage 2: sign the wrapper exes Velopack injected into Releases/
      # (Setup.exe + Update.exe). These are NOT in publish/, so stage 1 missed
      # them. Signing must happen BEFORE upload (and before the Revu-Setup.exe
      # copy below, so that copy inherits the signature).
      - name: Sign Velopack wrapper exes
        uses: azure/trusted-signing-action@v2.0.0
        with:
          endpoint: https://eus.codesigning.azure.net/
          signing-account-name: revu-signing
          certificate-profile-name: revu-public
          files-folder: ${{ github.workspace }}\Releases
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          timeout: 900

      - name: Upload Velopack release to GitHub
        shell: pwsh
        run: |
          vpk upload github `
            --repoUrl "https://github.com/${{ github.repository }}" `
            --token "${{ secrets.GITHUB_TOKEN }}" `
            --publish `
            --releaseName "Revu v${{ env.VERSION }}" `
            --tag "${{ env.TAG }}"

      # Velopack names the installer after --packId (LoLReview-win-Setup.exe).
      # We keep packId = LoLReview so auto-updates and delta generation stay
      # intact, but users shouldn't download a file called "LoLReview". Ship a
      # cleanly-named COPY (Revu-Setup.exe) as an extra release asset; the
      # website's download button prefers it. The original setup + the RELEASES
      # / .nupkg files Velopack needs are left untouched.
      - name: Stage cleanly-named installer copy
        shell: pwsh
        run: |
          $setup = Get-ChildItem Releases -Filter "*-win-Setup.exe" | Select-Object -First 1
          if (-not $setup) { throw "No *-win-Setup.exe found in Releases" }
          Copy-Item $setup.FullName -Destination "Releases/Revu-Setup.exe"
          Write-Host "Staged Revu-Setup.exe from $($setup.Name)"

      - name: Attach cleanly-named installer to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: Releases/Revu-Setup.exe
          fail_on_unmatched_files: true

      # Coach sidecar packs (coach-core ~31 MB + coach-ml ~234 MB) were built
      # and attached here. The AI coach feature was removed from the app for v1,
      # so we no longer build or ship those packs. The coach/ source remains in
      # the repo (and on the coach-preservation branch) for a future revival.
