name: Build & Release (C#)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run critical tests
        run: dotnet test src/LoLReview.Core.Tests/LoLReview.Core.Tests.csproj -c Release -p:Platform=x64 --logger "console;verbosity=normal"

  build:
    runs-on: windows-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Extract version from tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "Building version $VERSION from tag $TAG"

      - name: Stamp version in csproj
        shell: pwsh
        run: |
          $version = "${{ env.VERSION }}"
          $csproj = "src/LoLReview.App/LoLReview.App.csproj"
          $content = Get-Content $csproj -Raw
          $content = $content -replace '<Version>[^<]*</Version>', "<Version>$version</Version>"
          Set-Content $csproj $content
          Write-Host "Stamped version: $version"

      - name: Download ffmpeg
        shell: pwsh
        run: |
          try {
            Write-Host "Downloading ffmpeg..."
            $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
            Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip -TimeoutSec 180
            Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_tmp -Force
            $exe = Get-ChildItem -Recurse -Filter "ffmpeg.exe" ffmpeg_tmp `
                   | Where-Object { $_.DirectoryName -like "*bin*" } `
                   | Select-Object -First 1
            if ($exe) {
              New-Item -ItemType Directory -Force -Path deps
              Copy-Item $exe.FullName -Destination deps\ffmpeg.exe
              $mb = [math]::Round((Get-Item deps\ffmpeg.exe).Length / 1MB, 1)
              Write-Host "ffmpeg ready ($mb MB)"
            } else {
              Write-Warning "ffmpeg.exe not found in archive — building without it"
            }
          } catch {
            Write-Warning "ffmpeg download failed: $_ — building without it"
          } finally {
            Remove-Item ffmpeg.zip, ffmpeg_tmp -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Restore NuGet packages
        run: dotnet restore src/LoLReview.App/LoLReview.App.csproj -r win-x64

      - name: Build and publish with MSBuild
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "publish"
          msbuild src/LoLReview.App/LoLReview.App.csproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:RuntimeIdentifier=win-x64 `
            /p:SelfContained=true `
            "/p:PublishDir=$publishDir\" `
            /t:Publish `
            /m `
            /verbosity:minimal

      - name: Copy ffmpeg to publish output
        shell: pwsh
        run: |
          if (Test-Path deps\ffmpeg.exe) {
            Copy-Item deps\ffmpeg.exe publish\ffmpeg.exe
            Write-Host "ffmpeg copied to publish output"
          } else {
            Write-Host "No ffmpeg to copy — clip extraction will be unavailable"
          }

      - name: Verify publish output
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "publish"
          Write-Host "Publish dir: $publishDir"
          Write-Host "Exists: $(Test-Path $publishDir)"
          if (Test-Path $publishDir) {
            $exe = Get-ChildItem $publishDir -Filter "LoLReview.App.exe" -ErrorAction SilentlyContinue
            $pri = Get-ChildItem $publishDir -Filter "resources.pri" -ErrorAction SilentlyContinue
            Write-Host "LoLReview.App.exe: $($exe.Length) bytes"
            Write-Host "resources.pri: $($pri.Length) bytes"
            Write-Host "Total files: $((Get-ChildItem $publishDir | Measure-Object).Count)"
          } else {
            Write-Error "Publish directory not found!"
            exit 1
          }

      - name: Install vpk CLI
        run: dotnet tool install -g vpk

      - name: Download previous Velopack release (for delta generation)
        shell: pwsh
        run: |
          vpk download github `
            --repoUrl "https://github.com/${{ github.repository }}" `
            --token "${{ secrets.GITHUB_TOKEN }}"

      - name: Pack Velopack release
        shell: pwsh
        run: |
          vpk pack `
            --packId LoLReview `
            --packTitle "Revu" `
            --packVersion "${{ env.VERSION }}" `
            --packDir publish `
            --mainExe LoLReview.App.exe `
            --outputDir Releases

      - name: Upload Velopack release to GitHub
        shell: pwsh
        run: |
          vpk upload github `
            --repoUrl "https://github.com/${{ github.repository }}" `
            --token "${{ secrets.GITHUB_TOKEN }}" `
            --publish `
            --releaseName "Revu v${{ env.VERSION }}" `
            --tag "${{ env.TAG }}"

      # ───────────────────────────── Coach sidecar packs ─────────────────────────────
      #
      # The coach sidecar ships as two independent zips alongside the
      # Velopack release assets:
      #   coach-core-<ver>-win-x64.zip  — ~31 MB, embedded python + core deps
      #   coach-ml-<ver>-win-x64.zip    — ~234 MB, torch/sentence-transformers/hdbscan
      #
      # Both packs are version-pinned to the app version (they share
      # env.VERSION above) so the C# installer fetches matching assets
      # by building the URL from its running Assembly version.
      #
      # These steps run AFTER `vpk upload` so the release already exists
      # when we attach assets to it.

      - name: Setup Python 3.12 for coach packaging
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.8'

      - name: Build coach-core pack
        shell: pwsh
        run: |
          .\coach\packaging\build-core.ps1 -Version "${{ env.VERSION }}" -Clean

      - name: Build coach-ml pack
        shell: pwsh
        run: |
          .\coach\packaging\build-ml.ps1 -Version "${{ env.VERSION }}" -Clean

      - name: Verify coach pack outputs
        shell: pwsh
        run: |
          $dist = "coach/dist"
          $core = "$dist/coach-core-${{ env.VERSION }}-win-x64.zip"
          $coreSha = "$dist/coach-core-${{ env.VERSION }}-win-x64.sha256"
          $ml = "$dist/coach-ml-${{ env.VERSION }}-win-x64.zip"
          $mlSha = "$dist/coach-ml-${{ env.VERSION }}-win-x64.sha256"
          foreach ($f in @($core, $coreSha, $ml, $mlSha)) {
            if (-not (Test-Path $f)) { throw "Missing expected coach pack file: $f" }
            $size = (Get-Item $f).Length
            Write-Host "OK  $f  ($size bytes)"
          }

      - name: Attach coach packs to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: |
            coach/dist/coach-core-${{ env.VERSION }}-win-x64.zip
            coach/dist/coach-core-${{ env.VERSION }}-win-x64.sha256
            coach/dist/coach-ml-${{ env.VERSION }}-win-x64.zip
            coach/dist/coach-ml-${{ env.VERSION }}-win-x64.sha256
          fail_on_unmatched_files: true
