name: Build & Release (Tauri)

# NOTE (untested packaging path): this workflow was migrated from the old WinUI
# MSBuild pipeline to build the Tauri app + the C# sidecar and pack them with
# Velopack. The Velopack identity is preserved (packId=LoLReview) so existing
# installs update IN PLACE. The end-to-end packaging path (Tauri build → sidecar
# bundling → Velopack → auto-update) has NOT been validated by a real release yet.
# Shake it out with a PRERELEASE tag before trusting it for a public release.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write   # OIDC token for Azure Artifact Signing (azure/login)

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 8.0.x

      - name: Run critical tests
        run: dotnet test src/Revu.Core.Tests/Revu.Core.Tests.csproj -c Release -p:Platform=x64 --logger "console;verbosity=normal"

  build:
    runs-on: windows-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Extract version from tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "Building version $VERSION from tag $TAG"

      # Stamp the version into tauri.conf.json so the title bar (app_version) and the
      # bundle metadata match the tag. The sidecar/Core have no shipped version
      # surface that needs stamping for the desktop app.
      - name: Stamp version in tauri.conf.json
        shell: pwsh
        run: |
          $conf = "desktop/src-tauri/tauri.conf.json"
          $json = Get-Content $conf -Raw | ConvertFrom-Json
          $json.version = "${{ env.VERSION }}"
          $json | ConvertTo-Json -Depth 64 | Set-Content $conf
          Write-Host "Stamped tauri.conf.json version: ${{ env.VERSION }}"

      # ffmpeg ships INSIDE the signed release (clip extraction), so it is
      # supply-chain pinned: a fixed (dated) BtbN build + SHA-256 verification.
      # Download failure is soft (clips are optional); a CHECKSUM MISMATCH is a
      # tamper signal and hard-fails. To bump: pick a newer autobuild tag and take
      # the asset's sha256 from the GitHub release API.
      - name: Download ffmpeg (pinned + checksum-verified)
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/autobuild-2026-06-09-15-17/ffmpeg-n8.1.1-11-ge4c7fbf6c0-win64-gpl-8.1.zip"
          $expectedSha256 = "55ECBF2C5DB210A72D525746013F6C1AF87A8CB3D0740D42280222831FD7F157"
          $downloaded = $false
          try {
            Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip -TimeoutSec 300
            $downloaded = $true
          } catch {
            Write-Warning "ffmpeg download failed: $_ - building without it"
          }
          try {
            if ($downloaded) {
              $actual = (Get-FileHash ffmpeg.zip -Algorithm SHA256).Hash
              if ($actual -ne $expectedSha256) {
                Write-Error "ffmpeg checksum mismatch - expected $expectedSha256, got $actual."
                exit 1
              }
              Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_tmp -Force
              $exe = Get-ChildItem -Recurse -Filter "ffmpeg.exe" ffmpeg_tmp `
                     | Where-Object { $_.DirectoryName -like "*bin*" } | Select-Object -First 1
              if ($exe) {
                New-Item -ItemType Directory -Force -Path deps | Out-Null
                Copy-Item $exe.FullName -Destination deps\ffmpeg.exe
                Write-Host "ffmpeg ready"
              } else { Write-Warning "ffmpeg.exe not found in archive" }
            }
          } finally {
            Remove-Item ffmpeg.zip, ffmpeg_tmp -Recurse -Force -ErrorAction SilentlyContinue
          }

      # ── Build the C# sidecar (self-contained win-x64). Tauri spawns this exe at
      #    runtime; sidecar.rs's bundled lookup finds it next to the app exe. ──
      - name: Publish sidecar (self-contained)
        shell: pwsh
        run: |
          dotnet publish src/Revu.Sidecar/Revu.Sidecar.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:Platform=x64 `
            -o sidecar_publish

      # ── Build the Tauri app (release). cargo build (not `tauri build`) so we own
      #    the publish layout Velopack packs, instead of Tauri's own MSI/NSIS. ──
      - name: Install Tauri CLI + frontend deps
        shell: pwsh
        run: |
          npm --prefix desktop install
          cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri app (cargo, release)
        shell: pwsh
        working-directory: desktop/src-tauri
        run: cargo build --release

      # ── Assemble the publish dir Velopack will pack: the Tauri exe, the bundled
      #    frontend (../ui), the sidecar published output, and ffmpeg. The frontend
      #    is served from frontendDist (../ui); in a packaged build it must sit where
      #    the exe expects it. Tauri embeds the frontend into the binary for release
      #    builds (frontendDist is read at compile time), so only the exe + sidecar
      #    + ffmpeg need to ship. ──
      - name: Assemble publish dir
        shell: pwsh
        run: |
          $pub = "publish"
          New-Item -ItemType Directory -Force -Path $pub | Out-Null
          Copy-Item "desktop/src-tauri/target/release/revu-desktop.exe" "$pub/revu-desktop.exe"
          # Sidecar next to the app exe (sidecar.rs bundled lookup checks here first).
          Copy-Item "sidecar_publish/*" $pub -Recurse -Force
          if (Test-Path deps\ffmpeg.exe) { Copy-Item deps\ffmpeg.exe "$pub/ffmpeg.exe" }
          Write-Host "Publish contents:"; Get-ChildItem $pub | Select-Object Name, Length

      - name: Verify publish output
        shell: pwsh
        run: |
          if (-not (Test-Path "publish/revu-desktop.exe")) { Write-Error "revu-desktop.exe missing"; exit 1 }
          if (-not (Test-Path "publish/Revu.Sidecar.exe")) { Write-Error "Revu.Sidecar.exe missing"; exit 1 }
          Write-Host "OK: app + sidecar present"

      # ── Code signing (Azure Artifact Signing) — unchanged identity. OIDC login
      #    first so the signing action's DefaultAzureCredential picks up AZURE_*. ──
      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      # Sign the app + sidecar exes in publish/ BEFORE vpk packs. (exe only — the
      # bundled .NET runtime DLLs aren't what SmartScreen judges, and signing them
      # one-at-a-time blows the timeout, same rationale as the old WinUI flow.)
      - name: Sign published binaries
        uses: azure/trusted-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: https://eus.codesigning.azure.net/
          signing-account-name: revu-signing
          certificate-profile-name: revu-public
          files-folder: ${{ github.workspace }}\publish
          files-folder-filter: exe
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          timeout: 900

      - name: Install vpk CLI
        run: dotnet tool install -g vpk

      - name: Download previous Velopack release (for delta generation)
        shell: pwsh
        run: |
          vpk download github `
            --repoUrl "https://github.com/${{ github.repository }}" `
            --token "${{ secrets.GITHUB_TOKEN }}"

      # packId stays LoLReview so existing installs update IN PLACE (delta chain
      # intact); only --mainExe changes to the Tauri exe.
      - name: Pack Velopack release
        shell: pwsh
        run: |
          vpk pack `
            --packId LoLReview `
            --packTitle "Revu" `
            --packVersion "${{ env.VERSION }}" `
            --packDir publish `
            --mainExe revu-desktop.exe `
            --outputDir Releases

      # Sign the Velopack wrapper exes (Setup.exe + Update.exe) it injected into
      # Releases/ — not present in publish/, so the first signing pass missed them.
      - name: Sign Velopack wrapper exes
        uses: azure/trusted-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: https://eus.codesigning.azure.net/
          signing-account-name: revu-signing
          certificate-profile-name: revu-public
          files-folder: ${{ github.workspace }}\Releases
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          timeout: 900

      - name: Upload Velopack release to GitHub
        shell: pwsh
        run: |
          vpk upload github `
            --repoUrl "https://github.com/${{ github.repository }}" `
            --token "${{ secrets.GITHUB_TOKEN }}" `
            --publish `
            --releaseName "Revu v${{ env.VERSION }}" `
            --tag "${{ env.TAG }}"

      # Velopack names the installer after --packId (LoLReview-win-Setup.exe). We keep
      # packId=LoLReview for update continuity but ship a cleanly-named COPY
      # (Revu-Setup.exe) as an extra asset; the website download button prefers it.
      - name: Stage cleanly-named installer copy
        shell: pwsh
        run: |
          $setup = Get-ChildItem Releases -Filter "*-win-Setup.exe" | Select-Object -First 1
          if (-not $setup) { throw "No *-win-Setup.exe found in Releases" }
          Copy-Item $setup.FullName -Destination "Releases/Revu-Setup.exe"
          Write-Host "Staged Revu-Setup.exe from $($setup.Name)"

      - name: Attach cleanly-named installer to GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ env.TAG }}
          files: Releases/Revu-Setup.exe
          fail_on_unmatched_files: true
