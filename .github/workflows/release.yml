name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Extract version from tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "Building version $VERSION from tag $TAG"

      - name: Stamp version.py
        shell: pwsh
        run: |
          $version = "${{ env.VERSION }}"
          $path = "src/version.py"
          $content = Get-Content $path -Raw
          $content = $content -replace '__version__ = "[^"]*"', "__version__ = `"$version`""
          Set-Content $path $content
          Write-Host "Stamped version: $version"

      - name: Create deps directory
        run: New-Item -ItemType Directory -Force -Path deps

      - name: Download ffmpeg
        shell: pwsh
        run: |
          try {
            Write-Host "Downloading ffmpeg..."
            $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
            Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip -TimeoutSec 180
            Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_tmp -Force
            $exe = Get-ChildItem -Recurse -Filter "ffmpeg.exe" ffmpeg_tmp `
                   | Where-Object { $_.DirectoryName -like "*bin*" } `
                   | Select-Object -First 1
            if ($exe) {
              Copy-Item $exe.FullName -Destination deps\ffmpeg.exe
              $mb = [math]::Round((Get-Item deps\ffmpeg.exe).Length / 1MB, 1)
              Write-Host "ffmpeg ready ($mb MB)"
            } else {
              Write-Warning "ffmpeg.exe not found in archive — building without it"
            }
          } catch {
            Write-Warning "ffmpeg download failed: $_ — building without it"
          } finally {
            Remove-Item ffmpeg.zip, ffmpeg_tmp -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Download libmpv
        shell: pwsh
        run: |
          try {
            Write-Host "Fetching latest mpv release info..."
            $headers = @{ "User-Agent" = "lol-review-ci" }
            $release = Invoke-RestMethod `
              -Uri "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest" `
              -Headers $headers -TimeoutSec 30
            $asset = $release.assets `
              | Where-Object { $_.name -like "mpv-dev-x86_64-*.7z" } `
              | Select-Object -First 1
            if ($asset) {
              Write-Host "Downloading $($asset.name)..."
              Invoke-WebRequest -Uri $asset.browser_download_url `
                -OutFile mpv-dev.7z -TimeoutSec 180
              & 7z e mpv-dev.7z libmpv-2.dll -odeps -y 2>&1 | Out-Null
              if (Test-Path deps\libmpv-2.dll) {
                $mb = [math]::Round((Get-Item deps\libmpv-2.dll).Length / 1MB, 1)
                Write-Host "libmpv-2.dll ready ($mb MB)"
              } else {
                Write-Warning "libmpv-2.dll not found in archive — VOD playback will use system player"
              }
              Remove-Item mpv-dev.7z -Force -ErrorAction SilentlyContinue
            } else {
              Write-Warning "No mpv-dev-x86_64-*.7z asset found — building without libmpv"
            }
          } catch {
            Write-Warning "libmpv download failed: $_ — building without it"
          }

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          # Pipe "y\ny" to handle any missing-dep prompts that weren't downloaded above
          "y`ny" | python build.py

      - name: Verify build output
        shell: pwsh
        run: |
          $exe = "dist\LoLReview\LoLReview.exe"
          if (Test-Path $exe) {
            $mb = [math]::Round((Get-Item $exe).Length / 1MB, 1)
            Write-Host "Build succeeded: LoLReview.exe ($mb MB)"
          } else {
            Write-Error "Build failed — LoLReview.exe not found"
            exit 1
          }

      - name: Zip release artifact
        shell: pwsh
        run: |
          $zipName = "LoLReview-${{ env.TAG }}.zip"
          # Zip the contents directly (no subfolder) so the updater's
          # _copy_tree lands files in the right place on auto-update.
          Compress-Archive -Path dist\LoLReview\* -DestinationPath $zipName
          $mb = [math]::Round((Get-Item $zipName).Length / 1MB, 1)
          Write-Host "Zipped: $zipName ($mb MB)"
          # Verify the exe is at zip root (not in a subfolder)
          $entries = (& 7z l $zipName) | Where-Object { $_ -like "*LoLReview.exe*" }
          if ($entries) { Write-Host "Verified: LoLReview.exe at zip root" }
          else { Write-Warning "LoLReview.exe not found at zip root — check zip structure" }
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "LoL Review ${{ env.TAG }}"
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
          fail_on_unmatched_files: true
