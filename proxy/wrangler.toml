# Cloudflare Worker config. The `name` below becomes part of the deployed URL:
# https://<name>.<account-subdomain>.workers.dev
#
# Rename freely — after changing, run `wrangler deploy` and update the desktop
# app's RIOT_PROXY_URL config field to the new URL.
name = "revu-proxy"
main = "src/index.ts"
compatibility_date = "2025-01-10"

# Secrets (set via `wrangler secret put <NAME>`; never commit):
#   RIOT_API_KEY    — your permanent Riot API key
#   ALLOWED_TOKENS  — comma-separated list of user tokens
#
# Non-secret vars can go here:
[vars]
# Aggregate hard cap across all users, as a safety margin under Riot's 20/s
# app-rate-limit. If you upgrade to a higher-tier key, bump this.
AGGREGATE_RPS = "18"
# Per-token cap in requests/second. Session-token (Path B) users share this;
# static-token (Path A) operators use the same limit.
PER_TOKEN_RPS = "2"

# Comma-separated list of browser Origins allowed to call the proxy (for the web
# review tool). Leave unset in prod if only the desktop app uses this Worker.
ALLOWED_ORIGINS = "https://revu.lol,https://www.revu.lol,http://localhost:8788,http://127.0.0.1:8788"

# Magic-link emails are sent from this address. Must be on a Resend-verified domain.
MAGIC_LINK_FROM = "login@revu.lol"
# Link the user clicks in the email. For v1, a minimal landing page served by the
# Worker itself at /auth/claim — shows the one-time code to paste in the desktop app.
APP_NAME = "Revu"

# Origin used to BUILD shareable clip links. Clips are served on a dedicated
# subdomain so they never interfere with the main Pages site. No trailing slash.
PUBLIC_BASE = "https://clips.revu.lol"
# Origin of the static site that serves clip.html (the watch page). The Worker
# redirects clips.revu.lol/<id> here. No trailing slash.
WATCH_BASE = "https://revu.lol"

[[d1_databases]]
binding = "DB"
database_name = "revu-db"
database_id = "cfdaaa55-8443-480f-96e5-04eb3eb8c6ff"

# Object storage for shared clip video files. Requires R2 to be enabled on the
# Cloudflare account (Dashboard → R2 → enable), then:
#   wrangler r2 bucket create revu-clips
# Local `wrangler dev` simulates this bucket on disk without R2 being enabled.
[[r2_buckets]]
binding = "CLIPS"
bucket_name = "revu-clips"

# Daily cleanup of expired clips (30-day retention). Purges R2 objects + D1 rows.
[triggers]
crons = ["0 4 * * *"]
