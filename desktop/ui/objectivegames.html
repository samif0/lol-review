<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revu: Objective Games</title>
<script src="./nav-prepaint.js"></script>
<script src="./framed.js"></script>
<link rel="stylesheet" href="./styles.css">
<style>
  /* ── Page-scoped chrome (mirrors house vars; no SolidColorBrush). ─────────── */
  .og-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px}
  .og-back{flex-shrink:0;margin-top:3px;font-family:var(--fo);font-size:18px;line-height:1;
    color:var(--t3);background:transparent;border:1px solid var(--gline2);border-radius:10px;
    width:34px;height:34px;cursor:pointer;transition:transform .16s cubic-bezier(0.22,1,0.36,1),color .16s ease,border-color .16s ease}
  .og-back:hover{color:#fff;border-color:var(--gline);transform:translateX(-2px)}
  .og-back:active{transform:translateX(0);transition-duration:.06s}
  .og-titles{min-width:0}
  .og-title{font-family:var(--fo);font-size:24px;font-weight:600;color:#fff;letter-spacing:0.3px;line-height:1.15}
  .og-sub{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:6px}
  .og-status{font-family:var(--fm);font-size:11px;letter-spacing:0.5px;color:var(--t3)}
  .og-counter{font-family:var(--fm);font-size:11px;letter-spacing:0.5px;color:var(--t4)}

  /* Evidence ledger card. */
  .og-ledger{padding:14px 16px}
  .og-ledger-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:11px}
  .og-ledger-eyebrow{font-family:var(--fm);font-size:10px;letter-spacing:var(--label-spacing);text-transform:uppercase;color:var(--gold)}
  .og-ledger-sum{font-family:var(--fm);font-size:10px;letter-spacing:0.5px;color:var(--t3);text-align:right}
  .og-ev-list{display:flex;flex-direction:column;gap:6px}
  .og-ev{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
    padding:10px 12px;border-radius:10px;background:var(--glass2);border:1px solid var(--gline2);--ev:var(--accent)}
  .og-ev{border-color:color-mix(in srgb,var(--ev) 35%,transparent)}
  .og-ev-main{min-width:0}
  .og-ev-title{font-family:var(--fb);font-size:13px;font-weight:600;color:#fff;line-height:1.3}
  .og-ev-meta{font-family:var(--fm);font-size:9.5px;letter-spacing:0.5px;color:var(--t4);margin-top:5px}
  .og-ev-note{font-size:12px;color:var(--t3);margin-top:6px;line-height:1.4}
  .og-ev-chip{flex-shrink:0;font-family:var(--fm);font-size:8.5px;letter-spacing:1px;text-transform:uppercase;
    color:var(--ev);border:1px solid color-mix(in srgb,var(--ev) 45%,transparent);
    border-radius:6px;padding:3px 8px;white-space:nowrap;background:color-mix(in srgb,var(--ev) 8%,transparent)}

  /* Game row extras over the shared .gamerow. */
  .og-grow-main{min-width:0;flex:1}
  .og-grow-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .og-grow-wl{font-family:var(--fo);font-size:11px;font-weight:700;letter-spacing:0.5px}
  .og-grow-champ{font-family:var(--fo);font-size:15px;font-weight:600;color:#fff;letter-spacing:0.2px}
  .og-grow-kda{font-family:var(--fm);font-size:11px;color:var(--t3);letter-spacing:0.5px}
  .og-grow-date{font-family:var(--fm);font-size:10px;color:var(--t4);letter-spacing:0.5px}
  .og-badge{font-family:var(--fm);font-size:8.5px;letter-spacing:1px;text-transform:uppercase;
    border-radius:6px;padding:3px 8px;--bg:var(--gline2);--fg:var(--t3);color:var(--fg);
    background:color-mix(in srgb,var(--bg) 60%,transparent);border:1px solid color-mix(in srgb,var(--fg) 30%,transparent)}
  .og-grow-exec{font-size:12px;color:var(--t3);font-style:italic;margin-top:8px;line-height:1.4}
  .og-grow-acts{display:flex;gap:7px;flex-shrink:0;align-items:center}
  .og-act{font-family:var(--fm);font-size:10px;letter-spacing:1px;text-transform:uppercase;
    border-radius:8px;padding:7px 12px;cursor:pointer;white-space:nowrap;
    transition:transform .16s cubic-bezier(0.22,1,0.36,1),color .16s ease,background .16s ease,border-color .16s ease}
  .og-act:hover{transform:translateY(-1px)}
  .og-act:active{transform:translateY(0);transition-duration:.06s}
  .og-act-vod{color:#a9c8ff;border:1px solid rgba(57,150,255,0.4);background:rgba(57,150,255,0.08)}
  .og-act-vod:hover{color:#fff;background:rgba(57,150,255,0.18);border-color:rgba(57,150,255,0.6)}
  .og-act-review{color:var(--gold);border:1px solid rgba(243,199,148,0.4);background:rgba(243,199,148,0.07)}
  .og-act-review:hover{color:#1b1233;background:linear-gradient(180deg,#f6cfa0,var(--gold));border-color:transparent}

  .og-empty{padding:34px 20px;text-align:center}
  .og-empty-h{font-family:var(--fo);font-size:16px;font-weight:600;color:var(--t2)}
  @media(prefers-reduced-motion:reduce){.og-back,.og-act{transition:none}}
</style>
</head>
<body>
  <div class="aurora"><i class="a1"></i><i class="a2"></i><i class="a3"></i></div>
  <div class="grain"></div>
  <script type="module" src="./shell.js" data-page="objectives"></script>

  <!-- Persistent left nav rail. Authored as static HTML on every page (INCLUDING the -->
  <!-- .active item) so the whole rail + its highlight paint with the first frame — no -->
  <!-- JS injection, no late-mount, no highlight transitioning in on nav. shell.js only -->
  <!-- re-asserts the active item as a safety net; it never (re)builds this. -->
  <nav class="nav nav-ready">
    <a class="nav-i" data-nav="dashboard" href="index.html" aria-label="Dashboard"><svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10h5v-6h4v6h5V10" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="tip">Dashboard</span></a>
    <a class="nav-i" data-nav="games" href="games.html" aria-label="Games"><svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="tip">Games</span></a>
    <a class="nav-i active" data-nav="objectives" href="objectives.html" aria-label="Objectives"><svg viewBox="0 0 24 24"><path d="M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0 -18 0" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 12m-4 0a4 4 0 1 0 8 0a4 4 0 1 0 -8 0" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="tip">Objectives</span></a>
    <a class="nav-i" data-nav="patterns" href="patterns.html" aria-label="Patterns"><svg viewBox="0 0 24 24"><path d="M4 7h11v11H4zM9 4h11v11" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 11.5l2 2 3.5-4" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="tip">Patterns</span></a>
    <a class="nav-i" data-nav="tiltcheck" href="tiltcheck.html" aria-label="Tilt Check"><svg viewBox="0 0 24 24"><path d="M3 12h4l2 5 4-12 2 7h6" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="tip">Tilt Check</span></a>
    <a class="nav-i" data-nav="rules" href="rules.html" aria-label="Rules"><svg viewBox="0 0 24 24"><path d="M12 3l7 3v5c0 4.2-2.9 7.7-7 9-4.1-1.3-7-4.8-7-9V6l7-3zM9 12l2 2 4-4" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="tip">Rules</span></a>
    <div class="nav-spacer"></div>
    <a class="nav-i" data-nav="onboarding" href="onboarding.html" aria-label="Welcome / Sign in"><svg viewBox="0 0 24 24"><path d="M15 12H3M9 6l-6 6 6 6" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="tip">Welcome / Sign in</span></a>
    <a class="nav-i" data-nav="settings" href="settings.html" aria-label="Settings"><svg viewBox="0 0 24 24"><path d="M12 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0 -6 0" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="tip">Settings</span></a>
  </nav>
  <div class="shell">
    <div class="eyebrow">Learning · Objective</div>

    <!-- HEADER: back chevron + objective title / status / practiced-total counter -->
    <div class="og-head">
      <button class="og-back" id="back-btn" data-action="back" type="button" aria-label="Back">‹</button>
      <div class="og-titles">
        <div class="og-title" id="obj-title">Objective</div>
        <div class="og-sub">
          <span class="og-status" id="obj-status"></span>
          <span class="og-counter" id="obj-counter" hidden></span>
        </div>
      </div>
    </div>

    <div class="statusline" id="statusline"><span class="dot"></span> <b id="status-text">Loading…</b></div>

    <!-- EVIDENCE LEDGER — curated good/bad/neutral evidence for this objective. -->
    <div class="card og-ledger" id="ledger" hidden>
      <div class="og-ledger-head">
        <span class="og-ledger-eyebrow">Evidence Ledger</span>
        <span class="og-ledger-sum" id="ledger-sum"></span>
      </div>
      <div class="og-ev-list" id="ev-list"></div>
    </div>

    <!-- GAMES — every game linked to this objective. Reuses .gamerow hover hype. -->
    <div class="seclabel seclabel-lead" id="games-label" hidden>Games <span class="n" id="games-sub"></span></div>
    <div id="games-list"></div>

    <!-- EMPTY STATE — no games AND no evidence. -->
    <div class="card og-empty" id="empty" hidden>
      <div class="og-empty-h">No games recorded for this objective yet.</div>
    </div>

    <!-- ERROR PANEL (data-driven, mirrors dashboard) -->
    <div class="card errpanel" id="errpanel" hidden>
      <div class="crow">
        <div>
          <div class="vline" id="err-line">Couldn't load this objective.</div>
          <div class="vsmall" id="err-detail"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── REPEATING-CELL TEMPLATES ── -->

  <!-- One evidence-ledger row. Border + chip colored by polarity via --ev. -->
  <template id="tpl-ev">
    <div class="og-ev">
      <div class="og-ev-main">
        <div class="og-ev-title"></div>
        <div class="og-ev-meta"></div>
        <div class="og-ev-note" hidden></div>
      </div>
      <span class="og-ev-chip"></span>
    </div>
  </template>

  <!-- One game row. W/L edge bar + matchup headline; Watch VOD / Review jumps. -->
  <template id="tpl-game">
    <div class="card gamerow og-grow">
      <span class="gamerow-sweep" aria-hidden="true"></span>
      <span class="gamerow-edge" aria-hidden="true"></span>
      <div class="crow">
        <div class="og-grow-main">
          <div class="og-grow-top">
            <span class="og-grow-wl"></span>
            <span class="og-grow-champ"></span>
            <span class="og-grow-kda"></span>
            <span class="og-grow-date"></span>
            <span class="og-badge og-grow-practiced"></span>
          </div>
          <div class="og-grow-exec" hidden></div>
        </div>
        <div class="og-grow-acts">
          <button class="og-act og-act-vod" data-action="watch_vod" type="button">Watch VOD</button>
          <button class="og-act og-act-review" data-action="review_game" type="button">Review</button>
        </div>
      </div>
    </div>
  </template>

  <script type="module" src="./objectivegames.js"></script>
</body>
</html>
