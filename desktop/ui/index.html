<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revu</title>
<script src="./nav-prepaint.js"></script>
<link rel="stylesheet" href="./styles.css">
</head>
<body>
  <!-- ════ PERSISTENT APP SHELL ════
       This document is the window root and NEVER navigates. It holds the ONE nav
       rail (static markup, painted once for the app's whole life) and an <iframe>
       that hosts the actual pages. Nav clicks reload ONLY the iframe, so the rail
       cannot move/flicker on navigation — the rail is not part of any reloading
       document. The aurora/grain backdrop also lives here (once), behind the frame. -->
  <div class="aurora"><i class="a1"></i><i class="a2"></i><i class="a3"></i></div>
  <div class="grain"></div>

  <nav class="nav nav-ready">
    <a class="nav-i active" data-nav="dashboard" href="dashboard.html" aria-label="Dashboard"><svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10h5v-6h4v6h5V10" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="tip">Dashboard</span></a>
    <a class="nav-i" data-nav="games" href="games.html" aria-label="Games"><svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="tip">Games</span></a>
    <a class="nav-i" data-nav="objectives" href="objectives.html" aria-label="Objectives"><svg viewBox="0 0 24 24"><path d="M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0 -18 0" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 12m-4 0a4 4 0 1 0 8 0a4 4 0 1 0 -8 0" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="tip">Objectives</span></a>
    <a class="nav-i" data-nav="patterns" href="patterns.html" aria-label="Patterns"><svg viewBox="0 0 24 24"><path d="M4 7h11v11H4zM9 4h11v11" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 11.5l2 2 3.5-4" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="tip">Patterns</span></a>
    <a class="nav-i" data-nav="tiltcheck" href="tiltcheck.html" aria-label="Tilt Check"><svg viewBox="0 0 24 24"><path d="M3 12h4l2 5 4-12 2 7h6" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="tip">Tilt Check</span></a>
    <a class="nav-i" data-nav="rules" href="rules.html" aria-label="Rules"><svg viewBox="0 0 24 24"><path d="M12 3l7 3v5c0 4.2-2.9 7.7-7 9-4.1-1.3-7-4.8-7-9V6l7-3zM9 12l2 2 4-4" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="tip">Rules</span></a>
    <div class="nav-spacer"></div>
    <a class="nav-i" data-nav="onboarding" href="onboarding.html?signin=1" aria-label="Welcome / Sign in"><svg viewBox="0 0 24 24"><path d="M15 12H3M9 6l-6 6 6 6" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="tip">Welcome / Sign in</span></a>
    <a class="nav-i" data-nav="settings" href="settings.html" aria-label="Settings"><svg viewBox="0 0 24 24"><path d="M12 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0 -6 0" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="tip">Settings</span></a>
  </nav>

  <!-- Custom title bar (the window is frameless: decorations:false). This branded
       bar IS the title bar — REVU + version on the left, custom window controls on
       the right, draggable middle (data-tauri-drag-region). Mirrors old Revu (one
       branded bar, no separate OS strip). Lives in the persistent shell. -->
  <header class="appbar" id="appbar" data-tauri-drag-region>
    <span class="appbar-brand">REVU</span>
    <span class="appbar-ver" id="appbar-ver"></span>
    <!-- LCU (League Client) connection indicator. Dot + label; lights green when the
         client is connected. Driven by shell-outer.js off the SSE liveState +
         lcuConnection events. Starts in the disconnected (dim) state. -->
    <span class="appbar-lcu" id="appbar-lcu" title="League Client: not connected">
      <span class="appbar-lcu-dot"></span>
      <span class="appbar-lcu-txt">LCU</span>
    </span>
    <span class="appbar-spring" data-tauri-drag-region></span>
    <div class="appbar-controls">
      <button class="winbtn" id="win-min" type="button" aria-label="Minimize" title="Minimize">
        <svg viewBox="0 0 12 12" width="11" height="11" aria-hidden="true"><path d="M2 6h8" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/></svg>
      </button>
      <button class="winbtn" id="win-max" type="button" aria-label="Maximize" title="Maximize">
        <svg viewBox="0 0 12 12" width="11" height="11" aria-hidden="true"><rect x="2.3" y="2.3" width="7.4" height="7.4" rx="1" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
      </button>
      <button class="winbtn winbtn-close" id="win-close" type="button" aria-label="Close" title="Close">
        <svg viewBox="0 0 12 12" width="11" height="11" aria-hidden="true"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/></svg>
      </button>
    </div>
  </header>

  <!-- Update banner. Hidden until shell-outer.js finds a newer release on launch
       (or a manual Settings check). Sits just under the title bar. The button
       downloads + applies the update (the app relaunches into the new version). -->
  <div class="updbar" id="updbar" hidden>
    <span class="updbar-dot"></span>
    <span class="updbar-txt" id="updbar-txt">A new version of Revu is available.</span>
    <button class="updbar-btn" id="updbar-btn" type="button">Update &amp; restart</button>
    <button class="updbar-x" id="updbar-x" type="button" aria-label="Dismiss" title="Dismiss">&times;</button>
  </div>

  <!-- The content viewport. Pages load here; only this reloads on navigation. The
       initial page is the dashboard; a #hash on the shell URL can deep-link a page
       (e.g. index.html#vodplayer.html?gameId=5) — see shell-outer.js. -->
  <iframe id="app-frame" class="app-frame" title="Revu" src="dashboard.html"></iframe>

  <script type="module" src="./shell-outer.js"></script>
</body>
</html>
