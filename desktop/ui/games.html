<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revu: Games</title>
<script src="./nav-prepaint.js"></script>
<script src="./framed.js"></script>
<link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="aurora"><i class="a1"></i><i class="a2"></i><i class="a3"></i></div>
  <div class="grain"></div>
  <script type="module" src="./shell.js" data-page="games"></script>

  <!-- Persistent left nav rail. Authored as static HTML on every page (INCLUDING the -->
  <!-- .active item) so the whole rail + its highlight paint with the first frame — no -->
  <!-- JS injection, no late-mount, no highlight transitioning in on nav. shell.js only -->
  <!-- re-asserts the active item as a safety net; it never (re)builds this. -->
  <nav class="nav nav-ready">
    <a class="nav-i" data-nav="dashboard" href="index.html" aria-label="Dashboard"><svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10h5v-6h4v6h5V10" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="tip">Dashboard</span></a>
    <a class="nav-i active" data-nav="games" href="games.html" aria-label="Games"><svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="tip">Games</span></a>
    <a class="nav-i" data-nav="objectives" href="objectives.html" aria-label="Objectives"><svg viewBox="0 0 24 24"><path d="M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0 -18 0" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 12m-4 0a4 4 0 1 0 8 0a4 4 0 1 0 -8 0" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="tip">Objectives</span></a>
    <a class="nav-i" data-nav="patterns" href="patterns.html" aria-label="Patterns"><svg viewBox="0 0 24 24"><path d="M4 7h11v11H4zM9 4h11v11" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 11.5l2 2 3.5-4" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="tip">Patterns</span></a>
    <a class="nav-i" data-nav="tiltcheck" href="tiltcheck.html" aria-label="Tilt Check"><svg viewBox="0 0 24 24"><path d="M3 12h4l2 5 4-12 2 7h6" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="tip">Tilt Check</span></a>
    <a class="nav-i" data-nav="rules" href="rules.html" aria-label="Rules"><svg viewBox="0 0 24 24"><path d="M12 3l7 3v5c0 4.2-2.9 7.7-7 9-4.1-1.3-7-4.8-7-9V6l7-3zM9 12l2 2 4-4" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="tip">Rules</span></a>
    <div class="nav-spacer"></div>
    <a class="nav-i" data-nav="onboarding" href="onboarding.html" aria-label="Welcome / Sign in"><svg viewBox="0 0 24 24"><path d="M15 12H3M9 6l-6 6 6 6" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="tip">Welcome / Sign in</span></a>
    <a class="nav-i" data-nav="settings" href="settings.html" aria-label="Settings"><svg viewBox="0 0 24 24"><path d="M12 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0 -6 0" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="tip">Settings</span></a>
  </nav>
  <div class="shell">
    <div class="eyebrow">Objective Loop</div>
    <!-- Hero row: title on the left, Manual Entry action on the right (moved off the
         nav rail — manual entry is a Games-page action, not a daily-loop destination). -->
    <div class="games-hero">
      <div class="hero"><h1>Games</h1></div>
      <button class="cta games-manual-btn" id="manual-entry" data-action="manual_entry" type="button">+ MANUAL ENTRY</button>
    </div>
    <div class="statusline" id="statusline"><span class="dot"></span> <b id="status-text">Loading…</b></div>

    <!-- PRIMARY: Review-Queue command bar (the one loud element) + filter segment.
         Carries the live unreviewed count and switches the list below. -->
    <div class="glass primary games-bar" id="queue-bar">
      <div class="games-bar-lead">
        <div class="k" id="queue-k">Workspace · Review Queue</div>
        <h2 id="queue-h">Review Queue</h2>
        <div class="games-bar-cnt" id="queue-cnt"><span class="pdot"></span> <span id="queue-cnt-text">…</span></div>
      </div>
      <div class="seg" id="seg" role="tablist" aria-label="Switch games view">
        <button class="on" data-action="view" data-view="queue" role="tab" aria-selected="true">Queue</button>
        <button data-action="view" data-view="today" role="tab" aria-selected="false">Today</button>
        <button data-action="view" data-view="history" role="tab" aria-selected="false">History</button>
        <button data-action="view" data-view="vod" role="tab" aria-selected="false">VOD</button>
      </div>
    </div>

    <!-- AT-A-GLANCE — reuse the dashboard stat strip. -->
    <div class="strip" id="strip"></div>

    <!-- THE LIST — clickable game rows. The most prominent section. -->
    <div class="seclabel seclabel-lead" id="games-label">Games <span class="n" id="games-sub"></span></div>
    <div id="games-list"></div>

    <!-- Empty / filtered-empty state. -->
    <div class="games-empty" id="games-empty" hidden>
      <div class="games-empty-h" id="games-empty-h">No games recorded yet.</div>
      <div class="games-empty-p" id="games-empty-p">Play a ranked or normal game and it lands here for review.</div>
    </div>

    <!-- Load more — only when the server has more pages. Small, calm glass. -->
    <div class="loadwrap" id="loadwrap" hidden>
      <button class="loadmore" id="loadmore" data-action="load_more">Load More</button>
    </div>

    <!-- ERROR PANEL (data-driven, mirrors dashboard) -->
    <div class="card errpanel" id="errpanel" hidden>
      <div class="crow">
        <div>
          <div class="vline" id="err-line">Couldn't load your games.</div>
          <div class="vsmall" id="err-detail"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── REPEATING-CELL TEMPLATES ── -->
  <template id="tpl-stat">
    <div class="stat">
      <div class="k"></div>
      <div class="v"></div>
      <div class="s"></div>
    </div>
  </template>

  <!-- One game row. Whole row is the primary action (open_review). The KDA sits
       in its own column so numbers read fast; state tokens + an inline VOD link
       fill the meta row. Reuses .gamerow hover hype + W/L edge bar. -->
  <template id="tpl-gamerow">
    <div class="card gamerow gamerow-game" data-action="open_review" tabindex="0" role="button">
      <span class="gamerow-sweep" aria-hidden="true"></span>
      <span class="gamerow-edge" aria-hidden="true"></span>
      <div class="crow">
        <div class="grow-main">
          <div class="grow-top">
            <span class="grow-wl"></span>
            <span class="vline grow-champ"></span>
          </div>
          <div class="vsmall grow-meta"></div>
          <div class="grow-tokens"></div>
        </div>
        <div class="grow-right">
          <div class="grow-kda"><span class="grow-kda-n"></span><span class="grow-kda-r"></span></div>
          <div class="gamerow-cue" aria-hidden="true">REVIEW <span class="arr">→</span></div>
        </div>
      </div>
    </div>
  </template>

  <!-- A single state token chip (reviewed / VOD / objective state). -->
  <template id="tpl-token">
    <span class="gtoken"></span>
  </template>

  <script type="module" src="./games.js"></script>
</body>
</html>
